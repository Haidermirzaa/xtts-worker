name: Build and push XTTS worker to Docker Hub

# Triggers: builds on every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
    paths:
      - 'xtts-worker/**'   # Only rebuild if files in xtts-worker/ change
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60     # Should finish in ~25 min, but allow buffer

    steps:
      # 1. Get your code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Free up disk space on the runner — XTTS image needs ~12 GB
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      # 3. Set up Docker Buildx (better build engine than default)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Build the image and push directly to Docker Hub
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./xtts-worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest
          # Cache layers between builds — second build is way faster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 6. Show the final image size in the log
      - name: Image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "Pull with: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest"