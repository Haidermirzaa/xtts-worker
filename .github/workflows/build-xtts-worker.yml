name: Build and push XTTS worker to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 🔍 DIAGNOSTIC — prints exactly what files exist in the repo
      # so we can SEE the problem if Docker can't find the Dockerfile.
      - name: Show repo contents
        run: |
          echo "=== Repo root ==="
          ls -la
          echo ""
          echo "=== Inside xtts-worker/ subfolder ==="
          ls -la xtts-worker/ 2>/dev/null || echo "❌ xtts-worker/ does NOT exist as a folder!"
          echo ""
          echo "=== Hunting for any Dockerfile anywhere ==="
          find . -iname "dockerfile*" -not -path './.git/*'
          echo ""
          echo "=== Full file tree ==="
          find . -type f -not -path './.git/*' | head -50

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build with EXPLICIT dockerfile path so there's no ambiguity.
      # If files are in xtts-worker/ subfolder, this line works.
      # If they're at the repo root, change `file:` to just `Dockerfile`
      # and `context:` to just `.`
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./xtts-worker
          file: ./xtts-worker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "Pull with: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest"
