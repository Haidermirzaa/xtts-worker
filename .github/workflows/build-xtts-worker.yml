name: Build and push XTTS worker to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Files are in xtts-worker/ subfolder, so context points there
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./xtts-worker
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "Pull with: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest"
