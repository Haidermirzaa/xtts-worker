name: Build and push XTTS worker to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ⚙️ DIAGNOSTIC: list every file in the repo so we can SEE what's there
      - name: Show repo contents
        run: |
          echo "=== Files at repo root ==="
          ls -la
          echo ""
          echo "=== Full recursive tree (first 100 lines) ==="
          find . -type f -not -path './.git/*' | head -100
          echo ""
          echo "=== Looking specifically for Dockerfile ==="
          find . -iname "dockerfile*" -not -path './.git/*'
          echo ""
          echo "=== Current working directory ==="
          pwd

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image info
        run: |
          echo "✅ Image pushed successfully!"
          echo "Pull with: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/xtts-worker:latest"
